<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malolan · Sacred Texts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Noto+Sans:wght@400;500;600&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --sand-0:   #fdfaf3;
      --sand-1:   #f7f1e0;
      --sand-2:   #ede3c8;
      --sand-3:   #d9c89a;
      --amber-4:  #c49a3c;
      --amber-5:  #a67c20;
      --amber-6:  #7a5c10;
      --ink-0:    #1c1308;
      --ink-1:    #3d2b0f;
      --ink-2:    #6b4f23;
      --ink-3:    #9c7a48;
      --ruby:     #8b1a1a;
      --teal:     #1a5c5c;
      --divider:  rgba(196,154,60,0.18);
      --sidebar-w: 260px;
      --card-r:   10px;
      --focus:    0 0 0 3px rgba(196,154,60,0.35);
      --trans:    150ms ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--sand-0);
      color: var(--ink-0);
      font-family: 'Noto Sans', system-ui, sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(196,154,60,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(122,92,16,0.05) 0%, transparent 60%);
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--sand-3); border-radius: 4px; }
    * { scrollbar-width: thin; scrollbar-color: var(--sand-3) transparent; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(253,250,243,0.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--divider);
      padding: 0 1.5rem;
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 1rem;
      height: 58px;
    }
    .nav-brand {
      font-family: 'Noto Serif', serif;
      font-size: 1.25rem; font-weight: 600; color: var(--amber-6);
      text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
      flex-shrink: 0; letter-spacing: 0.02em; transition: color var(--trans);
    }
    .nav-brand:hover { color: var(--amber-5); }
    .nav-brand span { font-size: 1.1rem; }

    /* Sitewide search */
    .site-search-wrap {
      flex: 1; max-width: 480px; position: relative; display: flex; align-items: center;
    }
    .site-search-icon {
      position: absolute; left: 0.75rem; color: var(--amber-5); pointer-events: none;
      display: flex; align-items: center;
    }
    #site-search {
      width: 100%; padding: 0.42rem 2.5rem 0.42rem 2.1rem;
      background: white; border: 1px solid var(--sand-2);
      border-radius: 99px; font-size: 0.84rem; color: var(--ink-0);
      font-family: 'Noto Sans', sans-serif; outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    #site-search:focus { border-color: var(--amber-4); box-shadow: var(--focus); }
    #site-search::placeholder { color: var(--ink-3); }
    #site-search-clear {
      position: absolute; right: 0.55rem; background: none; border: none;
      cursor: pointer; color: var(--ink-3); display: none; align-items: center;
      padding: 4px; border-radius: 50%; transition: background var(--trans);
    }
    #site-search-clear:hover { background: var(--sand-1); color: var(--ink-1); }
    #site-search-clear.visible { display: flex; }

    .nav-meta { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    #nav-pill {
      display: none; background: var(--sand-1); border: 1px solid var(--sand-2);
      border-radius: 99px; padding: 0.22rem 0.75rem;
      font-size: 0.72rem; font-weight: 500; color: var(--ink-2);
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── HOMEPAGE ── */
    #home-view { display: none; }
    .home-hero {
      max-width: 680px; margin: 0 auto;
      padding: 4rem 1.5rem 2.5rem; text-align: center;
    }
    .home-hero h1 {
      font-family: 'Noto Serif', serif;
      font-size: clamp(1.9rem, 4vw, 2.7rem); font-weight: 600;
      color: var(--ink-0); line-height: 1.2;
    }
    .home-hero h1 em { font-style: italic; color: var(--amber-5); }
    .home-hero p { margin-top: 0.75rem; color: var(--ink-2); line-height: 1.7; }
    .divider-rule {
      width: 48px; height: 2px; margin: 1.5rem auto;
      background: linear-gradient(90deg, transparent, var(--amber-4), transparent);
    }
    .text-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
      gap: 1rem; max-width: 960px; margin: 0 auto 5rem; padding: 0 1.5rem;
    }
    .text-card {
      background: white; border: 1px solid var(--sand-2); border-radius: var(--card-r);
      padding: 1.4rem 1.5rem; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 0.6rem;
      transition: border-color var(--trans), box-shadow var(--trans), transform var(--trans);
      cursor: pointer;
    }
    .text-card:hover {
      border-color: var(--amber-4);
      box-shadow: 0 4px 24px rgba(122,92,16,0.1);
      transform: translateY(-2px);
    }
    .tc-top { display: flex; align-items: flex-start; gap: 0.85rem; }
    .tc-icon {
      width: 42px; height: 42px; flex-shrink: 0;
      background: var(--sand-1); border: 1px solid var(--sand-2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .tc-name {
      font-family: 'Noto Serif', serif; font-size: 1rem; font-weight: 600;
      color: var(--ink-0); line-height: 1.3;
    }
    .tc-author { font-size: 0.76rem; color: var(--ink-3); margin-top: 0.1rem; }
    .tc-desc { font-size: 0.82rem; color: var(--ink-2); line-height: 1.6; }
    .tc-stats {
      display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.25rem;
    }
    .tc-stat {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--amber-5);
      background: var(--sand-1); border: 1px solid var(--sand-2);
      border-radius: 4px; padding: 0.15rem 0.5rem;
    }
    /* Vitals grid on homepage card */
    .tc-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.5rem 0.75rem; margin-top: 0.6rem;
    }
    .tc-vital { display: flex; flex-direction: column; gap: 0.05rem; }
    .tc-vk {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .tc-vv { font-size: 0.82rem; color: var(--ink-1); font-weight: 500; }

    /* ── SEARCH RESULTS OVERLAY ── */
    #search-results-view { display: none; }
    .sr-header {
      max-width: 900px; margin: 1.5rem auto 0; padding: 0 1.5rem;
    }
    .sr-header h2 { font-size: 0.95rem; color: var(--ink-2); }
    .sr-header h2 strong { color: var(--ink-0); font-family: 'Noto Serif', serif; }
    #sr-list {
      max-width: 900px; margin: 1rem auto 4rem; padding: 0 1.5rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .sr-card {
      background: white; border: 1px solid var(--sand-2); border-radius: var(--card-r);
      padding: 1rem 1.2rem; cursor: pointer;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    .sr-card:hover { border-color: var(--amber-4); box-shadow: 0 2px 12px rgba(122,92,16,0.08); }
    .sr-card-top {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.4rem; flex-wrap: wrap;
    }
    .sr-source { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--amber-5); }
    .sr-dot { color: var(--sand-3); font-size: 0.6rem; }
    .sr-loc { font-size: 0.72rem; color: var(--ink-3); font-family: 'Noto Sans Mono', monospace; }
    .sr-snippet { font-size: 0.87rem; color: var(--ink-1); line-height: 1.65; }
    .sr-snippet mark { background: rgba(196,154,60,0.28); border-radius: 2px; padding: 0 1px; font-style: normal; }
    .sr-empty { text-align: center; padding: 3rem 1rem; color: var(--ink-3); font-size: 0.9rem; }

    /* ── READER SHELL ── */
    #reader-view { display: none; }
    .reader-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 500; color: var(--amber-5);
      text-decoration: none; border: 1px solid var(--sand-2);
      border-radius: 99px; padding: 0.32rem 0.75rem; background: white;
      margin: 0.75rem 0 0 1.25rem; transition: all var(--trans);
    }
    .reader-back:hover { border-color: var(--amber-4); background: var(--sand-0); }

    .reader-layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - 110px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--divider);
      background: rgba(253,250,243,0.6);
      padding: 0.75rem 0 2rem;
      position: sticky; top: 58px;
      height: calc(100vh - 58px);
      overflow-y: auto;
    }
    .sb-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink-3);
      padding: 0 1rem 0.5rem; display: block;
    }
    /* File-level search in sidebar */
    .sb-search-wrap {
      padding: 0 0.75rem 0.75rem; position: relative;
    }
    .sb-search-icon {
      position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%);
      color: var(--amber-5); pointer-events: none; display: flex; align-items: center;
    }
    #file-search {
      width: 100%; padding: 0.38rem 0.75rem 0.38rem 2rem;
      background: white; border: 1px solid var(--sand-2); border-radius: 99px;
      font-size: 0.78rem; color: var(--ink-0); font-family: 'Noto Sans', sans-serif;
      outline: none; transition: border-color var(--trans), box-shadow var(--trans);
    }
    #file-search:focus { border-color: var(--amber-4); box-shadow: var(--focus); }
    #file-search::placeholder { color: var(--ink-3); }
    #file-search-count {
      text-align: center; font-size: 0.68rem; color: var(--ink-3);
      padding: 0.15rem 0 0.4rem; display: none;
    }
    #file-search-nav {
      display: none; justify-content: center; gap: 0.35rem; padding-bottom: 0.5rem;
    }
    #file-search-nav.visible { display: flex; }
    .fsnav-btn {
      background: white; border: 1px solid var(--sand-2); border-radius: 4px;
      padding: 2px 8px; font-size: 0.72rem; color: var(--amber-5);
      cursor: pointer; transition: all var(--trans);
    }
    .fsnav-btn:hover { border-color: var(--amber-4); }

    .sb-group { margin-bottom: 0.1rem; }
    .sb-group-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.42rem 1rem; font-size: 0.81rem; font-weight: 600;
      font-family: 'Noto Serif', serif; color: var(--ink-1);
      cursor: pointer; transition: background var(--trans);
      border-left: 3px solid transparent;
    }
    .sb-group-btn:hover { background: var(--sand-1); }
    .sb-group-btn.open { border-left-color: var(--amber-4); background: var(--sand-1); }
    .sb-chevron { font-size: 0.55rem; color: var(--amber-4); transition: transform 0.2s; flex-shrink: 0; }
    .sb-items { display: none; }
    .sb-items.open { display: block; }
    .sb-item {
      padding: 0.27rem 1rem 0.27rem 1.6rem;
      font-size: 0.76rem; color: var(--ink-2); cursor: pointer;
      border-left: 3px solid transparent; transition: all var(--trans);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sb-item:hover { background: var(--sand-0); color: var(--ink-0); }
    .sb-item.active { border-left-color: var(--amber-5); color: var(--amber-6); background: var(--sand-0); }

    /* ── READER CONTENT ── */
    .reader-content {
      padding: 1.75rem 2.5rem;
      overflow-y: auto;
      height: calc(100vh - 110px);
    }

    /* Text metadata strip */
    .text-meta-strip {
      background: white; border: 1px solid var(--sand-2); border-radius: var(--card-r);
      padding: 1rem 1.25rem; margin-bottom: 1.75rem;
      display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem;
    }
    .meta-item { display: flex; flex-direction: column; gap: 0.1rem; }
    .meta-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-3); }
    .meta-value { font-size: 0.84rem; color: var(--ink-1); }

    /* Section */
    .section-block { margin-bottom: 2.75rem; scroll-margin-top: 70px; }
    .section-heading {
      display: flex; align-items: baseline; gap: 0.75rem;
      padding-bottom: 0.6rem; border-bottom: 1px solid var(--divider);
      margin-bottom: 1.25rem;
    }
    .section-heading h2 {
      font-family: 'Noto Serif', serif; font-size: 1.05rem; font-weight: 600;
      color: var(--ink-0);
    }
    .section-badge {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--amber-6);
      background: var(--sand-1); border: 1px solid var(--sand-2);
      border-radius: 4px; padding: 0.12rem 0.45rem;
    }

    /* Verse card */
    .verse-card {
      background: white; border: 1px solid var(--sand-2); border-radius: var(--card-r);
      margin-bottom: 1rem; overflow: hidden;
      transition: border-color var(--trans);
      scroll-margin-top: 70px;
    }
    .verse-card.hl { border-color: var(--amber-4); box-shadow: 0 0 0 3px rgba(196,154,60,0.15); }
    @keyframes flash-amber {
      0%   { box-shadow: 0 0 0 0   rgba(196,154,60,0.5); }
      100% { box-shadow: 0 0 0 10px rgba(196,154,60,0); }
    }
    .verse-card.flash { animation: flash-amber 0.55s ease-out; }

    .verse-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 1rem; background: var(--sand-1);
      border-bottom: 1px solid var(--sand-2);
      cursor: default;
    }
    .verse-num {
      font-family: 'Noto Sans Mono', monospace; font-size: 0.7rem;
      font-weight: 500; color: var(--amber-5); flex-shrink: 0;
    }
    .verse-original {
      padding: 0.85rem 1.1rem;
      font-family: 'Noto Serif', serif; font-size: 1rem;
      line-height: 1.95; color: var(--ink-0);
      white-space: pre-wrap; word-break: break-word;
    }

    /* IAST / translation toggles */
    .verse-extras { border-top: 1px solid var(--sand-1); }
    .extra-row {
      border-top: 1px solid var(--sand-1);
    }
    .extra-row:first-child { border-top: none; }
    .extra-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.45rem 1rem; cursor: pointer;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--amber-6);
      user-select: none; transition: background var(--trans);
    }
    .extra-toggle:hover { background: var(--sand-0); }
    .extra-toggle-icon { font-size: 0.55rem; transition: transform 0.2s; color: var(--amber-4); }
    .extra-body {
      display: none; padding: 0.75rem 1.1rem;
      font-size: 0.88rem; color: var(--ink-1); line-height: 1.75;
      background: var(--sand-0); white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--sand-1);
    }
    .extra-body.open { display: block; }

    /* Commentary */
    .commentaries-wrap { border-top: 1px solid var(--sand-2); }
    .commentary-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1rem; cursor: pointer;
      background: var(--sand-0); transition: background var(--trans);
      user-select: none;
    }
    .commentary-toggle:hover { background: var(--sand-1); }
    .ct-left { display: flex; align-items: center; gap: 0.5rem; }
    .ct-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--amber-6); }
    .ct-count {
      font-size: 0.65rem; background: var(--amber-4); color: white;
      border-radius: 99px; padding: 0 0.4rem; font-weight: 600;
    }
    .ct-chevron { font-size: 0.55rem; color: var(--amber-4); transition: transform 0.2s; }
    .commentary-body { display: none; }
    .commentary-body.open { display: block; }
    .commentary-item {
      border-top: 1px solid var(--sand-1);
      padding: 0.85rem 1.1rem;
    }
    .commentary-author {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--amber-5); margin-bottom: 0.45rem;
    }
    .commentary-text {
      font-size: 0.87rem; color: var(--ink-1); line-height: 1.8;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Highlight marks */
    mark.hl-m {
      background: rgba(196,154,60,0.3); border-radius: 3px;
      padding: 0 2px; font-weight: 600; color: inherit;
    }

    /* ── STATUS OVERLAY ── */
    #status-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(253,250,243,0.88); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    #status-overlay.on { display: flex; }
    .status-box {
      background: white; border: 1px solid var(--sand-2); border-radius: 14px;
      padding: 2.5rem 3rem; text-align: center;
      box-shadow: 0 8px 40px rgba(122,92,16,0.1);
    }
    .spinner {
      width: 30px; height: 30px; border-radius: 50%; margin: 0 auto 1rem;
      border: 3px solid var(--sand-2); border-top-color: var(--amber-4);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { font-family: 'Noto Serif', serif; color: var(--amber-6); }
    .status-text.err { font-family: 'Noto Sans', sans-serif; color: #b91c1c; font-size: 0.88rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .reader-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static; height: auto; max-height: 40vh;
        border-right: none; border-bottom: 1px solid var(--divider);
      }
      .reader-content { height: auto; padding: 1rem; }
    }
    @media (max-width: 520px) {
      .home-hero { padding: 2.5rem 1rem 1.5rem; }
      .text-grid { padding: 0 1rem; }
    }

    /* ── UTILITY ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="nav-brand" id="brand-link" href="#">
      <span>📜</span> Malolan
    </a>

    <div class="site-search-wrap">
      <span class="site-search-icon">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      </span>
      <input id="site-search" type="text" placeholder="Search all texts… (Press /)" autocomplete="off" spellcheck="false">
      <button id="site-search-clear" title="Clear search" aria-label="Clear search">
        <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" clip-rule="evenodd"/></svg>
      </button>
    </div>

    <div class="nav-meta">
      <div id="nav-pill"></div>
    </div>
  </div>
</nav>

<!-- STATUS OVERLAY -->
<div id="status-overlay">
  <div class="status-box">
    <div class="spinner"></div>
    <p class="status-text" id="status-text">Loading texts…</p>
  </div>
</div>

<!-- HOMEPAGE -->
<div id="home-view">
  <div class="home-hero">
    <h1>Explore the <em>Sacred Corpus</em></h1>
    <div class="divider-rule"></div>
    <p>Verse-by-verse reader with collapsible commentaries, transliterations, and translations across the Pāñcarātra tradition.</p>
  </div>
  <div id="text-grid" class="text-grid"></div>
</div>

<!-- SEARCH RESULTS VIEW -->
<div id="search-results-view">
  <div class="sr-header">
    <h2>Results for <strong id="sr-query-label"></strong></h2>
  </div>
  <div id="sr-list"></div>
</div>

<!-- READER VIEW -->
<div id="reader-view">
  <a class="reader-back" id="reader-back" href="#">
    <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
    All texts
  </a>

  <div class="reader-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <span class="sb-label">Contents</span>
      <div class="sb-search-wrap">
        <span class="sb-search-icon">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        </span>
        <input id="file-search" type="text" placeholder="Search this text…" autocomplete="off">
      </div>
      <div id="file-search-count"></div>
      <div id="file-search-nav">
        <button class="fsnav-btn" id="fsn-prev">↑ Prev</button>
        <button class="fsnav-btn" id="fsn-next">↓ Next</button>
        <button class="fsnav-btn" id="fsn-clear">✕</button>
      </div>
      <div id="sidebar-tree"></div>
    </aside>

    <!-- CONTENT -->
    <main class="reader-content" id="reader-content">
      <div id="meta-strip" class="text-meta-strip"></div>
      <div id="reader-body"></div>
    </main>
  </div>
</div>

<script>
(function () {
  /* ─── REGISTRY ─── */
  // Populated at runtime by fetching data/manifest.json.
  // manifest.json is a simple JSON array of filenames, e.g. ["foo.json","bar.json"].
  // To add a new text: drop its JSON into /data/ and add its filename to manifest.json.
  const BASE_URL  = 'https://malolan05.github.io/agama/';
  const DATA_DIR  = 'data/';
  const MANIFEST  = DATA_DIR + 'manifest.json';
  let REGISTRY = [];  // { slug, label, file }[] — filled by loadManifest()

  /* ─── DOM refs ─── */
  const homeView    = document.getElementById('home-view');
  const srView      = document.getElementById('search-results-view');
  const readerView  = document.getElementById('reader-view');
  const overlay     = document.getElementById('status-overlay');
  const statusText  = document.getElementById('status-text');
  const textGrid    = document.getElementById('text-grid');
  const srList      = document.getElementById('sr-list');
  const srLabel     = document.getElementById('sr-query-label');
  const sidebarTree = document.getElementById('sidebar-tree');
  const readerBody  = document.getElementById('reader-body');
  const metaStrip   = document.getElementById('meta-strip');
  const navPill     = document.getElementById('nav-pill');
  const brandLink   = document.getElementById('brand-link');
  const readerBack  = document.getElementById('reader-back');
  const siteSearch  = document.getElementById('site-search');
  const siteSearchClear = document.getElementById('site-search-clear');
  const fileSearch  = document.getElementById('file-search');
  const fileSearchCount = document.getElementById('file-search-count');
  const fileSearchNav   = document.getElementById('file-search-nav');
  const fsnPrev     = document.getElementById('fsn-prev');
  const fsnNext     = document.getElementById('fsn-next');
  const fsnClear    = document.getElementById('fsn-clear');

  /* ─── STATE ─── */
  let loadedTexts = {};          // slug → parsed JSON
  let currentSlug = null;
  let fileSearchMatches = [];    // array of mark elements in current reader
  let fileSearchPtr = -1;
  let siteSearchDebounce = null;
  let fileSearchDebounce = null;

  /* ─── UTILS ─── */
  const esc = s => !s ? '' : String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function showOverlay(msg, isErr = false) {
    overlay.classList.add('on');
    statusText.textContent = msg;
    statusText.className = isErr ? 'status-text err' : 'status-text';
  }
  function hideOverlay() { overlay.classList.remove('on'); }

  function setView(which) {
    homeView.style.display   = which === 'home'   ? 'block' : 'none';
    srView.style.display     = which === 'search' ? 'block' : 'none';
    readerView.style.display = which === 'reader' ? 'block' : 'none';
    navPill.style.display    = which === 'reader' ? 'block' : 'none';
    // Clear file search when leaving reader
    if (which !== 'reader') clearFileSearch();
  }

  /* ─── INIT ─── */
  wireGlobalKeys();
  brandLink.addEventListener('click', e => { e.preventDefault(); history.pushState(null,'',BASE_URL); goHome(); });
  readerBack.addEventListener('click',  e => { e.preventDefault(); history.pushState(null,'',BASE_URL); goHome(); });
  window.addEventListener('popstate', () => routeFromURL());
  loadManifest();

  /* ─── MANIFEST LOADER ─── */
  async function loadManifest() {
    showOverlay('Loading library…');
    try {
      const res = await fetch(MANIFEST);
      if (!res.ok) throw new Error('manifest.json not found (HTTP ' + res.status + ')');
      const files = await res.json();
      if (!Array.isArray(files) || !files.length) throw new Error('manifest.json is empty or invalid');
      REGISTRY = files.map(filename => ({
        slug: filename.replace(/\.json$/i, ''),
        label: filename.replace(/\.json$/i, '').replace(/[-_]/g, ' '),
        file: DATA_DIR + filename,
      }));
      hideOverlay();
      buildHomepage();
      routeFromURL();   // honour a direct /agama/<slug> URL on first load
    } catch (e) {
      showOverlay('Could not load data/manifest.json — ' + e.message, true);
    }
  }

  /* ─── URL ROUTING ─── */
  function slugFromURL() {
    // Matches  /agama/<slug>  or  /agama/<slug>/  anywhere in the path
    const m = window.location.pathname.match(/\/agama\/([^/?#]+)/);
    return m ? m[1] : null;
  }

  async function routeFromURL() {
    const slug = slugFromURL();
    if (slug && REGISTRY.find(r => r.slug === slug)) {
      await openText(slug);
    } else {
      setView('home');
    }
  }

  /* ─── HOMEPAGE ─── */
  function buildHomepage() {
    textGrid.innerHTML = '';
    // Eagerly fetch metadata for all texts so cards populate immediately
    REGISTRY.forEach(reg => { if (!loadedTexts[reg.slug]) loadTextMeta(reg.slug); });
    REGISTRY.forEach(reg => {
      const card = document.createElement('a');
      card.className = 'text-card';
      card.href = BASE_URL + reg.slug;
      card.innerHTML = `
        <div class="tc-top">
          <div class="tc-icon">📜</div>
          <div>
            <div class="tc-name" id="tc-name-${reg.slug}">${esc(reg.label)}</div>
            <div class="tc-author" id="tc-author-${reg.slug}">—</div>
          </div>
        </div>
        <div class="tc-desc" id="tc-desc-${reg.slug}">—</div>
        <div class="tc-meta-grid" id="tc-meta-${reg.slug}"></div>
        <div class="tc-stats" id="tc-stats-${reg.slug}"></div>`;
      card.addEventListener('click', e => {
        e.preventDefault();
        history.pushState(null, '', BASE_URL + reg.slug);
        openText(reg.slug);
      });
      textGrid.appendChild(card);
      if (loadedTexts[reg.slug]) populateCard(reg.slug);
    });
    setView('home');
  }

  function populateCard(slug) {
    const d = loadedTexts[slug];
    if (!d) return;
    const m = d.metadata;
    const nEl  = document.getElementById('tc-name-'  + slug);
    const aEl  = document.getElementById('tc-author-'+ slug);
    const dEl  = document.getElementById('tc-desc-'  + slug);
    const mgEl = document.getElementById('tc-meta-'  + slug);
    const sEl  = document.getElementById('tc-stats-' + slug);
    if (nEl  && m.scripture_name)    nEl.textContent  = m.scripture_name;
    if (aEl)  aEl.textContent  = m.author || '—';
    if (dEl)  dEl.textContent  = m.description || '';
    // Vital metadata grid
    if (mgEl) {
      const vitals = [
        ['Category',  m.category],
        ['Language',  m.language],
        ['Composed',  m.year_of_composition],
        ['Chapters',  m.total_chapters],
        ['Verses',    m.total_verses],
      ].filter(([,v]) => v);
      mgEl.innerHTML = vitals.map(([k,v]) =>
        '<div class="tc-vital"><span class="tc-vk">' + esc(k) + '</span><span class="tc-vv">' + esc(String(v)) + '</span></div>'
      ).join('');
    }
    if (sEl) sEl.innerHTML = '';  // stats row now redundant — cleared
  }

  // Lightweight fetch of just the JSON to populate a homepage card
  // (same as loadText but doesn't render the reader)
  async function loadTextMeta(slug) {
    try {
      const data = await loadText(slug);
      populateCard(slug);
    } catch(_) {}
  }

  function goHome() {
    currentSlug = null;
    siteSearch.value = '';
    siteSearchClear.classList.remove('visible');
    buildHomepage();
  }

  /* ─── LOAD JSON ─── */
  async function loadText(slug) {
    if (loadedTexts[slug]) return loadedTexts[slug];
    const reg = REGISTRY.find(r => r.slug === slug);
    if (!reg) throw new Error('Unknown text: ' + slug);
    showOverlay('Loading ' + reg.label + '…');
    const res = await fetch(reg.file);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    loadedTexts[slug] = data;
    // Update REGISTRY label from real metadata now that we have it
    if (data.metadata?.scripture_name) reg.label = data.metadata.scripture_name;
    populateCard(slug);
    return data;
  }

  /* ─── OPEN TEXT ─── */
  async function openText(slug) {
    try {
      const data = await loadText(slug);
      hideOverlay();
      currentSlug = slug;
      navPill.textContent = data.metadata.scripture_name || slug;
      renderMeta(data.metadata);
      renderReader(data);
      buildSidebar(data);
      clearFileSearch();
      setView('reader');
    } catch(e) {
      showOverlay('Failed to load: ' + e.message, true);
    }
  }

  /* ─── META STRIP ─── */
  function renderMeta(m) {
    const fields = [
      ['Scripture', m.scripture_name],
      ['Author', m.author],
      ['Composed', m.year_of_composition],
      ['Language', m.language],
      ['Category', m.category],
      ['Chapters', m.total_chapters],
      ['Verses', m.total_verses],
    ].filter(([,v]) => v);
    metaStrip.innerHTML = fields.map(([k, v]) => `
      <div class="meta-item">
        <span class="meta-label">${esc(k)}</span>
        <span class="meta-value">${esc(String(v))}</span>
      </div>`).join('');
  }

  /* ─── READER ─── */
  function renderReader(data) {
    readerBody.innerHTML = '';
    const sections = data.content?.sections || [];
    sections.forEach(section => {
      const secEl = document.createElement('div');
      secEl.className = 'section-block';
      secEl.id = `sec-${section.number}`;
      secEl.innerHTML = `
        <div class="section-heading">
          <h2>${esc(section.title)}</h2>
          <span class="section-badge">${(section.verses || []).length} verses</span>
        </div>`;
      (section.verses || []).forEach(verse => {
        secEl.appendChild(buildVerseCard(verse, section.number));
      });
      readerBody.appendChild(secEl);
    });
  }

  function buildVerseCard(verse, sectionNum) {
    const card = document.createElement('div');
    card.className = 'verse-card';
    card.id = `v-${sectionNum}-${verse.verse_number}`;

    /* Header */
    const hdr = document.createElement('div');
    hdr.className = 'verse-header';
    hdr.innerHTML = `<span class="verse-num">§ ${sectionNum}.${verse.verse_number}</span>`;
    card.appendChild(hdr);

    /* Original text */
    const orig = document.createElement('div');
    orig.className = 'verse-original';
    orig.setAttribute('data-searchable', '');
    orig.textContent = verse.original_text || '';
    card.appendChild(orig);

    /* Extras: IAST & translation */
    const extrasWrap = document.createElement('div');
    extrasWrap.className = 'verse-extras';

    if (verse.iast_text) extrasWrap.appendChild(makeExtraRow('IAST Transliteration', verse.iast_text));
    if (verse.english_translation) extrasWrap.appendChild(makeExtraRow('English Translation', verse.english_translation));

    if (extrasWrap.children.length) card.appendChild(extrasWrap);

    /* Commentaries */
    const comms = (verse.commentaries || []).filter(c => c.commentary);
    if (comms.length) {
      const cWrap = document.createElement('div');
      cWrap.className = 'commentaries-wrap';

      const toggle = document.createElement('div');
      toggle.className = 'commentary-toggle';
      toggle.innerHTML = `
        <div class="ct-left">
          <span class="ct-label">Commentary</span>
          <span class="ct-count">${comms.length}</span>
        </div>
        <span class="ct-chevron">▶</span>`;
      cWrap.appendChild(toggle);

      const body = document.createElement('div');
      body.className = 'commentary-body';

      comms.forEach(c => {
        const item = document.createElement('div');
        item.className = 'commentary-item';
        const authorEl = document.createElement('div');
        authorEl.className = 'commentary-author';
        authorEl.textContent = c.author || '';
        const textEl = document.createElement('div');
        textEl.className = 'commentary-text';
        textEl.setAttribute('data-searchable', '');
        textEl.textContent = c.commentary;
        item.appendChild(authorEl);
        item.appendChild(textEl);
        body.appendChild(item);
      });

      toggle.addEventListener('click', () => {
        const open = body.classList.toggle('open');
        toggle.querySelector('.ct-chevron').style.transform = open ? 'rotate(90deg)' : '';
      });

      cWrap.appendChild(body);
      card.appendChild(cWrap);
    }

    return card;
  }

  function makeExtraRow(label, text) {
    const row = document.createElement('div');
    row.className = 'extra-row';

    const tog = document.createElement('div');
    tog.className = 'extra-toggle';
    tog.innerHTML = `<span>${esc(label)}</span><span class="extra-toggle-icon">▶</span>`;

    const body = document.createElement('div');
    body.className = 'extra-body';
    body.setAttribute('data-searchable', '');
    body.textContent = text;

    tog.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      tog.querySelector('.extra-toggle-icon').style.transform = open ? 'rotate(90deg)' : '';
    });

    row.appendChild(tog);
    row.appendChild(body);
    return row;
  }

  /* ─── SIDEBAR ─── */
  function buildSidebar(data) {
    sidebarTree.innerHTML = '';
    const sections = data.content?.sections || [];
    sections.forEach(section => {
      const group = document.createElement('div');
      group.className = 'sb-group';

      const btn = document.createElement('div');
      btn.className = 'sb-group-btn';
      btn.innerHTML = `<span>${esc(section.title)}</span><span class="sb-chevron">▶</span>`;
      group.appendChild(btn);

      const items = document.createElement('div');
      items.className = 'sb-items';

      (section.verses || []).forEach(verse => {
        const item = document.createElement('div');
        item.className = 'sb-item';
        const preview = (verse.original_text || '').split('\n')[0].slice(0, 40);
        item.textContent = `${verse.verse_number}. ${preview}`;
        item.title = preview;
        item.addEventListener('click', () => {
          const el = document.getElementById(`v-${section.number}-${verse.verse_number}`);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); flashCard(el); }
          document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('active'));
          item.classList.add('active');
        });
        items.appendChild(item);
      });

      btn.addEventListener('click', () => {
        const open = items.classList.toggle('open');
        btn.classList.toggle('open', open);
        btn.querySelector('.sb-chevron').style.transform = open ? 'rotate(90deg)' : '';
        // Scroll section into view
        if (open) {
          const el = document.getElementById(`sec-${section.number}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

      group.appendChild(items);
      sidebarTree.appendChild(group);
    });
  }

  function flashCard(el) {
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
    el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
  }

  /* ─── FILE-LEVEL SEARCH ─── */
  fileSearch.addEventListener('input', e => {
    clearTimeout(fileSearchDebounce);
    fileSearchDebounce = setTimeout(() => doFileSearch(e.target.value), 160);
  });
  fileSearch.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); stepFileSearch(e.shiftKey ? -1 : 1); }
    if (e.key === 'Escape') clearFileSearch();
  });
  fsnPrev.addEventListener('click', () => stepFileSearch(-1));
  fsnNext.addEventListener('click', () => stepFileSearch(1));
  fsnClear.addEventListener('click', () => { clearFileSearch(); fileSearch.focus(); });

  function doFileSearch(query) {
    // Remove previous highlights
    document.querySelectorAll('mark.hl-m').forEach(m => {
      m.parentNode.replaceChild(document.createTextNode(m.textContent), m);
    });
    document.querySelectorAll('[data-searchable]').forEach(el => el.normalize());
    document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('hl'));
    fileSearchMatches = []; fileSearchPtr = -1;

    const q = query.trim().toLowerCase();
    if (!q) {
      fileSearchCount.style.display = 'none';
      fileSearchNav.classList.remove('visible');
      return;
    }

    // Auto-open commentary bodies so we can search inside
    document.querySelectorAll('.commentary-body:not(.open)').forEach(b => {
      b.classList.add('open');
      const chev = b.previousElementSibling?.querySelector('.ct-chevron');
      if (chev) chev.style.transform = 'rotate(90deg)';
    });
    document.querySelectorAll('.extra-body:not(.open)').forEach(b => {
      b.classList.add('open');
      const icon = b.previousElementSibling?.querySelector('.extra-toggle-icon');
      if (icon) icon.style.transform = 'rotate(90deg)';
    });

    document.querySelectorAll('[data-searchable]').forEach(el => hlInNode(el, q));
    fileSearchMatches = Array.from(document.querySelectorAll('mark.hl-m'));
    fileSearchCount.textContent = fileSearchMatches.length
      ? `${fileSearchMatches.length} result${fileSearchMatches.length > 1 ? 's' : ''}`
      : '0 results';
    fileSearchCount.style.display = 'block';

    if (fileSearchMatches.length) {
      fileSearchNav.classList.add('visible');
      fileSearchPtr = 0;
      scrollToFileMatch(0);
    } else {
      fileSearchNav.classList.remove('visible');
    }
  }

  function stepFileSearch(dir) {
    if (!fileSearchMatches.length) return;
    fileSearchPtr = (fileSearchPtr + dir + fileSearchMatches.length) % fileSearchMatches.length;
    scrollToFileMatch(fileSearchPtr);
  }

  function scrollToFileMatch(idx) {
    const m = fileSearchMatches[idx];
    if (!m) return;
    document.querySelectorAll('.verse-card.hl').forEach(c => c.classList.remove('hl'));
    const card = m.closest('.verse-card');
    if (card) { card.classList.add('hl'); flashCard(card); }
    m.scrollIntoView({ behavior: 'smooth', block: 'center' });
    fileSearchCount.textContent = `${idx + 1} / ${fileSearchMatches.length}`;
  }

  function clearFileSearch() {
    fileSearch.value = '';
    doFileSearch('');
    fileSearchCount.style.display = 'none';
    fileSearchNav.classList.remove('visible');
  }

  function hlInNode(container, q) {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(textNode => {
      const text = textNode.nodeValue;
      const lo = text.toLowerCase();
      let idx = lo.indexOf(q);
      if (idx === -1) return;
      const frag = document.createDocumentFragment();
      let last = 0;
      while (idx !== -1) {
        if (idx > last) frag.appendChild(document.createTextNode(text.slice(last, idx)));
        const mark = document.createElement('mark');
        mark.className = 'hl-m';
        mark.textContent = text.slice(idx, idx + q.length);
        frag.appendChild(mark);
        last = idx + q.length;
        idx = lo.indexOf(q, last);
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
    });
  }

  /* ─── SITE-WIDE SEARCH ─── */
  siteSearch.addEventListener('input', e => {
    clearTimeout(siteSearchDebounce);
    const q = e.target.value.trim();
    siteSearchClear.classList.toggle('visible', q.length > 0);
    if (!q) { goHome(); return; }
    siteSearchDebounce = setTimeout(() => doSiteSearch(q), 300);
  });
  siteSearch.addEventListener('keydown', e => {
    if (e.key === 'Escape') { siteSearch.value = ''; siteSearchClear.classList.remove('visible'); goHome(); }
  });
  siteSearchClear.addEventListener('click', () => {
    siteSearch.value = '';
    siteSearchClear.classList.remove('visible');
    goHome();
  });

  async function doSiteSearch(query) {
    // Load all texts we haven't loaded yet
    showOverlay('Searching…');
    try {
      await Promise.all(REGISTRY.map(r => loadText(r.slug).catch(() => null)));
    } catch(_) {}
    hideOverlay();

    const q = query.toLowerCase();
    const results = [];

    Object.entries(loadedTexts).forEach(([slug, data]) => {
      const meta = data.metadata;
      (data.content?.sections || []).forEach(section => {
        (section.verses || []).forEach(verse => {
          const fields = [
            { label: 'original_text', text: verse.original_text || '' },
            { label: 'iast_text', text: verse.iast_text || '' },
            { label: 'english_translation', text: verse.english_translation || '' },
            ...(verse.commentaries || []).map(c => ({ label: c.author || 'commentary', text: c.commentary || '' })),
          ].filter(f => f.text);

          fields.forEach(({ label, text }) => {
            const lo = text.toLowerCase();
            const idx = lo.indexOf(q);
            if (idx === -1) return;
            const start = Math.max(0, idx - 60);
            const end   = Math.min(text.length, idx + q.length + 100);
            const snippet = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
            results.push({
              slug, sectionNum: section.number, verseNum: verse.verse_number,
              sectionTitle: section.title,
              scriptName: meta.scripture_name,
              label, snippet, query,
            });
          });
        });
      });
    });

    renderSearchResults(query, results);
  }

  function renderSearchResults(query, results) {
    srLabel.textContent = `"${query}"`;
    srList.innerHTML = '';

    if (!results.length) {
      srList.innerHTML = `<div class="sr-empty">No results for "${esc(query)}" across all loaded texts.</div>`;
      setView('search');
      return;
    }

    // Deduplicate: one card per (slug, sectionNum, verseNum) — but show matched field
    const seen = new Set();
    const q = query.toLowerCase();

    results.forEach(r => {
      const key = `${r.slug}-${r.sectionNum}-${r.verseNum}`;
      if (seen.has(key)) return; // only first match per verse to avoid clutter
      seen.add(key);

      const card = document.createElement('div');
      card.className = 'sr-card';
      card.innerHTML = `
        <div class="sr-card-top">
          <span class="sr-source">${esc(r.scriptName)}</span>
          <span class="sr-dot">●</span>
          <span class="sr-loc">${esc(r.sectionTitle)} · verse ${r.verseNum}</span>
        </div>
        <div class="sr-snippet">${esc(r.snippet).replace(
          new RegExp(esc(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
          m => `<mark>${m}</mark>`
        )}</div>`;
      card.addEventListener('click', async () => {
        siteSearch.value = '';
        siteSearchClear.classList.remove('visible');
        history.pushState(null, '', BASE_URL + r.slug);
        await openText(r.slug);
        // After rendering, scroll to verse
        setTimeout(() => {
          const el = document.getElementById(`v-${r.sectionNum}-${r.verseNum}`);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); flashCard(el); }
        }, 80);
      });
      srList.appendChild(card);
    });

    // If more hits than shown
    if (results.length > seen.size) {
      srList.insertAdjacentHTML('beforeend',
        `<div class="sr-empty" style="padding:0.75rem 0 0; font-size:0.78rem;">
           Showing ${seen.size} verse${seen.size > 1 ? 's' : ''} (${results.length} total matches across commentary fields)
         </div>`);
    }

    setView('search');
  }

  /* ─── KEYBOARD SHORTCUTS ─── */
  function wireGlobalKeys() {
    document.addEventListener('keydown', e => {
      const active = document.activeElement?.tagName;
      if (e.key === '/' && !['INPUT','TEXTAREA'].includes(active)) {
        e.preventDefault();
        if (readerView.style.display !== 'none') {
          fileSearch.focus();
        } else {
          siteSearch.focus();
        }
      }
    });
  }

})();
</script>
</body>
</html>
